id: vision_query
version: 0.4.0
kind: atomic
description: Ask a question about an image. Returns the answer plus a 'found' boolean
  indicating whether the image contains the requested information. By default uses
  the last screenshot from view_screen, or pass an explicit image_path. This skill
  is READ-ONLY — it never clicks, types, or interacts.
side_effects:
- llm_call
preconditions:
- ctx.llm is configured with a vision role
postconditions:
- len(response) > 0
examples:
- inputs:
    prompt: What numbers are visible in the puzzle grid?
  note: Ask about the last screenshot taken by view_screen.
- inputs:
    prompt: What text is on the button?
    image_path: /path/to/screenshot.png
  note: Ask about a specific image file.
tests:
- basic.json
tags:
- vision
- reasoning
- llm
- observation
- core
