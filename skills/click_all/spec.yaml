id: click_all
version: 0.1.0
kind: atomic
description: Click every coordinate in a RunStore table. The table must have 'x' and
  'y' integer columns. Clicks are performed sequentially with a configurable delay
  between them.
side_effects:
- screen_input
preconditions:
- backend.connected
postconditions:
- all rows clicked
examples:
- inputs:
    store_table: spots
    delay_ms: 100
  note: Click all spots with 100ms delay between clicks.
tags:
- mouse
- input
- store
- core
