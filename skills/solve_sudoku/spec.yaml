id: solve_sudoku
version: 0.1.0
kind: atomic
description: Solves a 9x9 Sudoku puzzle using backtracking. Input is a 9x9 grid as
  a list of 9 lists of 9 integers (0 = empty). Returns the solved grid or null if
  unsolvable.
preconditions:
- len(grid) == 9
- all(len(row) == 9 for row in grid)
- all(0 <= cell <= 9 for row in grid for cell in row)
postconditions:
- solved is None or (len(solved) == 9 and all(len(r) == 9 for r in solved))
